spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/fitcoach_db?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
    username: ${DB_USER:fitcoach}
    password: ${DB_PASSWORD:fitcoach1234}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    show-sql: true
    open-in-view: false

jwt:
  secret: ${JWT_SECRET:fitcoach-secret-key-must-be-at-least-32-chars-long}
  expiration: 86400000

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
